<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新案訪視檔填寫系統</title>
    
    <!-- 網頁 Favicon 圖示 (筆記本圖案) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📝</text></svg>">
    
    <!-- 引入生成的 Tailwind CSS -->
    <link rel="stylesheet" href="output.css">
    <!-- 引入 React 與 ReactDOM -->
    <script src="assets/react.production.min.js"></script>
    <script src="assets/react-dom.production.min.js"></script>
        <!-- 引入 Lucide Icons -->
    <script src="assets/lucide.min.js"></script>

    <style>
        /* 預覽與列印共用樣式 (A4 文件質感) */
        .print-container {
            padding: 1cm;
            font-size: 16px;
            line-height: 28px;
            font-family: "標楷體", "BiauKai", "DFKai-SB", serif;
            color: black;
            box-sizing: border-box;
        }
        .print-container h3 {
            font-size: 16px;
            font-weight: bold;
            margin-top: 1.5em;
            margin-bottom: 0.5em;
        }
        .print-container p {
            margin-bottom: 0.5em;
            text-align: justify;
        }

        /* 列印專用樣式 */
        @page {
            margin: 1.27cm;
        }
        @media print {
            body, html {
                background-color: white !important;
                margin: 0 !important;
                padding: 0 !important;
                min-width: 0 !important;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-container {
                padding: 0;
                background-color: white !important;
                min-height: auto !important;
            }
            .highlight-input {
                font-weight: bold;
                color: black;
                background-color: transparent;
            }
            /* 優化列印排版 */
            #export-content {
                display: block;
                width: 100%;
            }
        }

        @media screen {
            .print-only {
                display: none;
            }
            .highlight-input {
                color: black;
                background-color: transparent;
                font-weight: bold;
            }
        }

        body {
            background-color: #f3f4f6;
            min-width: 1024px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="app.js"></script>
</body>
</html>
